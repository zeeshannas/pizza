{% extends 'base.html' %}
{% block title %}Customer{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{% if customer %}Edit{% else %}New{% endif %} customer</h1>
<div class="op-card p-4" style="max-width:520px;">
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input type="text" name="name" class="form-control" required value="{{ customer.name if customer else '' }}">
    </div>
    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" name="phone" class="form-control" required value="{{ customer.phone if customer else '' }}">
    </div>
    <button class="btn btn-op-primary">Save</button>
    <a href="{{ url_for('customers.list_customers') }}" class="btn btn-op-ghost ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
