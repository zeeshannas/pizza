<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Olive Pizza</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="theme-op d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div class="w-100" style="max-width:420px;">
    <div class="text-center mb-4">
      <div class="fs-2 fw-bold">OLIVE <span style="color:var(--op-accent)">PIZZA</span></div>
      <div class="text-muted-op small">Staff &amp; Admin sign in</div>
    </div>
    <div class="op-card p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" required autocomplete="username">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-op-primary w-100 py-2">Sign in</button>
      </form>
    </div>
    <p class="text-center text-muted-op small mt-3 mb-0">© Olive Pizza Operations</p>
  </div>
</body>
</html>
