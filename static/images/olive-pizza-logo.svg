<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Olive Pizza</title>
  <desc id="desc">Stylized olive and pizza slice mark for Olive Pizza</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="crust" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="rgba(201,162,39,0.35)" stroke-width="2"/>
  <!-- Pizza slice -->
  <path fill="url(#crust)" stroke="rgba(0,0,0,0.15)" stroke-width="0.5"
        d="M60 22 L88 78 Q60 92 32 78 Z"/>
  <path fill="#f59e0b" opacity="0.95"
        d="M60 28 L82 74 Q60 84 38 74 Z"/>
  <circle cx="52" cy="52" r="3.2" fill="#b91c1c" opacity="0.9"/>
  <circle cx="66" cy="58" r="2.8" fill="#b91c1c" opacity="0.85"/>
  <circle cx="58" cy="64" r="2.5" fill="#b91c1c" opacity="0.8"/>
  <!-- Olive -->
  <ellipse cx="78" cy="38" rx="14" ry="18" fill="url(#gold)" transform="rotate(-18 78 38)" filter="url(#glow)"/>
  <ellipse cx="80" cy="36" rx="5" ry="7" fill="#14532d" opacity="0.35" transform="rotate(-18 80 36)"/>
  <ellipse cx="76" cy="40" rx="3" ry="4" fill="#86efac" opacity="0.25" transform="rotate(-18 76 40)"/>
</svg>
